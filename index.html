    :root {
      --bg-primary:   #171717;
      --bg-secondary: #0d0d0d;
      --bg-tertiary:  #212121;
      --text-primary:   #d4d4d8;
      --text-secondary: #a1a1aa;

      --code-header: rgba(255,255,255,0.03);
      --tooltip-bg:  #1a1a1a;
      --tooltip-text:#ffffff;
    }

    [data-theme='light'] {
      --bg-primary:   #ffffff;
      --bg-secondary: #f9f9fb;
      --bg-tertiary:  #f0f0f3;
      --text-primary:   #1a1a1a;
      --text-secondary: #4b5563;
      --border:      #e5e7eb;
      --highlight:   #111827;
      --accent:      #059669;
      --header-bg:   rgba(255,255,255,0.9);
      --code-bg:     #f3f4f6;
      --code-header: #e5e7eb;
      --tooltip-bg:  #111827;
      --tooltip-text:#ffffff;
    }

    body {
      font-family: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      margin: 0; padding: 0;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overscroll-behavior: none;
      height: 100vh; height: 100dvh;
      width: 100vw; max-width: 100%;
      overflow: hidden;
      -webkit-touch-callout: none;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    #root {
      height: 100vh; height: 100dvh;
      width: 100vw; max-width: 100%;
      display: flex; flex-direction: column;
      overflow: hidden;
      contain: layout style;
    }

    #root:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
    }
    #root:empty::after {
      content: '';
      width: 40px; height: 40px;
      border: 3px solid rgba(16,185,129,0.2);
      border-top-color: #10B981;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    [data-sedrex-tooltip] { position: relative; }
    [data-sedrex-tooltip]::after {
      content: attr(data-sedrex-tooltip);
      position: absolute; top: 100%; margin-top: 4px;
      left: 50%; transform: translateX(-50%) translateY(-3px);
      background: var(--tooltip-bg); color: var(--tooltip-text);
      padding: 3px 8px; border-radius: 6px;
      font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      white-space: nowrap;
      box-shadow: 0 4px 12px -2px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      opacity: 0; pointer-events: none;
      transition: all 0.15s cubic-bezier(0.4,0,0.2,1);
      z-index: 1000;
    }
    [data-sedrex-tooltip]:hover::after {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }

    .markdown-body {
      -webkit-user-select: text; user-select: text;
      min-width: 0; max-width: 100%; overflow-x: hidden;
      line-height: 1.6; font-size: 1rem;
      letter-spacing: -0.01em;
      word-break: break-word; overflow-wrap: break-word;

    @media (max-width: 640px) {

    }

    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }

    .markdown-body p, .markdown-body > div { margin-bottom: 1rem; }

    .markdown-body h1, .markdown-body h2, .markdown-body h3 {

      margin-top: 2rem; margin-bottom: 1rem; letter-spacing: -0.025em;

    .markdown-body li { margin-bottom: 0.35rem; line-height: 1.6; }
    .markdown-body strong { color: var(--highlight); }

    .markdown-body blockquote {

      padding: 0.75rem 1rem; margin: 1.5rem 0;
      color: var(--text-secondary); font-style: italic;
      background: var(--bg-tertiary);
      border-radius: 0 8px 8px 0;
    }

    .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .markdown-body ul ul, .markdown-body ol ol,
    .markdown-body ul ol,  .markdown-body ol ul { margin-top: 0.3rem; margin-bottom: 0.3rem; }
    .markdown-body li > strong:first-child { color: var(--accent); }

    .hljs { background: var(--code-bg) !important; color: var(--text-primary); }

    .markdown-body table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      margin: 2.5rem 0; border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      background: var(--bg-secondary);
    }
    .markdown-body th {
      background: var(--code-header); color: var(--highlight);
      font-weight: 700; text-align: left;
      padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border);
      font-size: 0.8125rem; text-transform: uppercase; letter-spacing: 0.08em;
    }
    .markdown-body td {
      padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border);
      font-size: 0.9375rem; color: var(--text-primary);
    }

    @media (max-width: 640px) {
      .markdown-body th { font-size: 0.75rem; padding: 0.625rem 1rem; }
      .markdown-body td { font-size: 0.875rem; padding: 0.625rem 1rem; }
    }

    .markdown-body pre {
      background-color: var(--code-bg) !important;
      border: 1px solid var(--border); border-radius: 16px;
      min-width: fit-content; padding: 0 !important;
      overflow-x: auto; max-width: 100%; display: block;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.15);
    }
    .markdown-body code {

    }
    @media (max-width: 640px) { .markdown-body code { font-size: 0.8125rem; } }
    .markdown-body pre code {

    }
    .markdown-body img, .markdown-body video, .markdown-body iframe {
      max-width: 100%; height: auto;
    }
    .markdown-body :not(pre) > code {
      background: var(--bg-tertiary); color: var(--accent);
      padding: 0.15em 0.4em; border-radius: 5px;
      font-size: 0.875em; font-weight: 600; border: 1px solid var(--border);
    }
    @media (max-width: 640px) { .markdown-body :not(pre) > code { font-size: 0.8125em; } }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--text-secondary); opacity: 0.3; border-radius: 10px; }

    .glass {

    .sidebar-transition {

    button:active, .chat-ctrl-btn:active, .message-action-btn:active,

    @keyframes thought-pulse {

    .thought-dot { animation: thought-pulse 1.5s infinite ease-in-out; }

    textarea, input { caret-color: var(--accent) !important; }

    html, body, #root { overflow-x: hidden; width: 100%; position: relative; }

    button, a, [role="button"], input, textarea, select {
      touch-action: manipulation;

    .gap-12 > div { content-visibility: auto; contain-intrinsic-size: auto 120px; }

    header.glass { min-height: 56px; }
    @media (min-width: 640px) { header.glass { min-height: 64px; } }

  <script>
    /* ── Service Worker ───────────────────────────────── */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(reg => {
            reg.addEventListener('updatefound', () => {
              const nw = reg.installing;
              if (!nw) return;
              nw.addEventListener('statechange', () => {
                if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                  window.dispatchEvent(new CustomEvent('sw-update-ready', { detail: reg }));
                }
              });
            });
          })
          .catch(err => console.warn('[SW] Registration failed:', err));

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) { refreshing = true; window.location.reload(); }
        });
      });
    }

    /* ── PWA shortcut action routing ──────────────────── */
    (function () {
      const params = new URLSearchParams(window.location.search);
      const action = params.get('action');
      if (action) sessionStorage.setItem('pwa-launch-action', action);
    })();
  </script>
